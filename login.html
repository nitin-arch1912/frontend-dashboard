<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hindu College ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-dark: #004dd9;
            --secondary: #00d4ff;
            --accent: #ff006e;
            --bg-dark: #0a0e27;
            --bg-light: #f8faff;
            --card-dark: #141829;
            --text-dark: #e0e6ff;
            --text-light: #1a1f3a;
            --error: #ff4757;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2847 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            z-index: 10;
        }

        .logo {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .logo-subtitle {
            color: rgba(224, 230, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .login-card {
            background: rgba(20, 24, 41, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
        }

        .login-card p {
            color: rgba(224, 230, 255, 0.6);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 10px;
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(224, 230, 255, 0.4);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 102, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .password-toggle {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 1rem;
            top: 2.8rem;
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .toggle-btn:hover {
            color: var(--secondary);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input {
            width: auto;
            margin: 0;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: var(--secondary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 8px 32px rgba(0, 102, 255, 0.3);
            margin-bottom: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 48px rgba(0, 102, 255, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login.loading {
            pointer-events: none;
        }

        .btn-login.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .signup-link {
            text-align: center;
            color: rgba(224, 230, 255, 0.7);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: var(--secondary);
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            animation: slideDown 0.3s ease;
            display: none;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff6b7a;
        }

        .alert.success {
            background: rgba(46, 213, 115, 0.1);
            border: 1px solid rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }

        .alert.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="login-container">
        <div class="logo">
            <div class="logo-text">Hindu College</div>
            <div class="logo-subtitle">Student Portal</div>
        </div>

        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Sign in to access your academic dashboard</p>

            <div class="alert" id="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input 
                        type="text" 
                        id="studentId" 
                        placeholder="e.g., STU2024001"
                        required
                    >
                </div>

                <div class="form-group password-toggle">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password"
                        required
                    >
                    <button type="button" class="toggle-btn" id="togglePassword">👁️</button>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-login" id="loginBtn">Sign In</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const studentIdInput = document.getElementById('studentId');
        const loginBtn = document.getElementById('loginBtn');
        const alert = document.getElementById('alert');

        // Demo credentials
        const demoAccounts = [
            { studentId: 'STU2024001', password: 'demo123' },
            { studentId: 'STU2024002', password: 'demo123' },
        ];

        togglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePassword.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                togglePassword.textContent = '👁️';
            }
        });

        function showAlert(message, type = 'error') {
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = studentIdInput.value.trim();
            const password = passwordInput.value;

            if (!studentId || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            loginBtn.classList.add('loading');

            // Simulate API call
            setTimeout(() => {
                const isValid = demoAccounts.some(
                    acc => acc.studentId === studentId && acc.password === password
                );

                if (isValid) {
                    showAlert('Login successful! Redirecting...', 'success');
                    localStorage.setItem('auth', JSON.stringify({
                        studentId,
                        timestamp: new Date().getTime(),
                        rememberMe: document.getElementById('rememberMe').checked
                    }));

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert('Invalid student ID or password', 'error');
                    loginBtn.classList.remove('loading');
                }
            }, 1500);
        });

        // Demo login hint
        const style = document.createElement('style');
        style.textContent = `
            body::after {
                content: 'Demo: STU2024001 / demo123';
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(0, 212, 255, 0.1);
                border: 1px solid rgba(0, 212, 255, 0.3);
                color: var(--secondary);
                padding: 0.75rem 1rem;
                border-radius: 8px;
                font-size: 0.8rem;
                z-index: 1000;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
